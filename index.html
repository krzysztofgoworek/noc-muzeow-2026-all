.layout{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden}

.filter-row{display:flex;gap:6px;flex-wrap:wrap}
select.flt{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:5px 8px;color:#e8e8f0;font-size:11px;outline:none;cursor:pointer;flex:1;min-width:120px}
select.flt:focus{border-color:rgba(120,100,255,.4)}
.toggle-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tog-label{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px;cursor:pointer}

.filter-result{font-size:10px;color:rgba(255,255,255,.3);padding:0 2px}

.venue-scroll::-webkit-scrollbar-track{background:transparent}
.venue-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

.vcard:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
.vcard.selected{border-color:rgba(100,220,130,.3);background:rgba(60,180,100,.05)}
.vcard.deselected{opacity:.35}
.vcard-chk{width:15px;height:15px;border-radius:3px;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.vcard.selected .vcard-chk{background:#3dbb6e;border-color:#3dbb6e}
.vcard-tick{display:none;color:#fff;font-size:9px;font-weight:700}

function travelMin(f,t){return(TRAVEL[f]||TRAVEL.start)[t]||20;}

function phase(v){
  if(v.cluster==='outer')    return 8;
  if(v.cluster==='bemowo')   return 0;
  if(v.cluster==='bialoleka')return 0.5;
  if(v.cluster==='praga')    return 1;
  if(!v.fixed&&v.close<=1290) return 2;
  if(v.cluster==='zoliborz') return 2.5;
  if(v.cluster==='oldtown')  return 3;
  if(v.cluster==='riverside'&&!v.fixed) return 3.5;
  if(v.cluster==='royalway') return 4;
  if(v.cluster==='centrum'&&!v.fixed) return 4;
  if(v.cluster==='ochota')   return 4.5;
  if(v.fixed)                return 5;
  if(v.cluster==='mokotow')  return 6;
  return 5;
}

function getTransport(from,to){
  if(!from||from==='start') return null;
  if(from===to){
    if(['oldtown','riverside','royalway'].includes(to)) return {text:'Spacer ~5–8 min',type:'walk'};
    if(to==='centrum') return {text:'Spacer ~5 min',type:'walk'};
    if(to==='mokotow') return {text:'Spacer ~8 min',type:'walk'};
    return {text:'Spacer',type:'walk'};
  }
  if(from==='bemowo'||to==='bemowo') return {text:'Taxi ~20–25 min',type:'taxi'};
  if(from==='bialoleka'||to==='bialoleka') return {text:'Taxi lub bus ~25–30 min',type:'taxi'};
  if(to==='praga'||from==='praga') return {text:'Metro M2 lub tramwaj linia M',type:'transit'};
  if(to==='zoliborz') return {text:'Tramwaj (linia 17/7) ~20–25 min',type:'transit'};
  if(from==='zoliborz') return {text:'Tramwaj w kierunku centrum',type:'transit'};
  if((from==='oldtown'||from==='riverside')&&(to==='oldtown'||to==='riverside')) return {text:'Spacer ~10 min',type:'walk'};
  if(to==='oldtown'||to==='riverside') return {text:'Spacer lub tramwaj ~15 min',type:'walk'};
  if(to==='royalway') return {text:'Spacer lub bus ~15 min',type:'walk'};
  if(to==='centrum') return {text:'Tramwaj lub linia C ~15 min',type:'transit'};
  if(to==='ochota'||from==='ochota') return {text:'Taxi lub bus ~20–25 min',type:'taxi'};
  if(to==='mokotow') return {text:'Taxi lub linia B ~15–20 min',type:'taxi'};
  if(to==='outer') return {text:'Transport własny lub taxi',type:'taxi'};
  return {text:'Bus lub tramwaj ~15 min',type:'transit'};
}

function fmt(m){const h=Math.floor(m/60)%24,mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');}

function computePlan(sel){
  if(!sel.length) return [];
  const sorted=[...sel].sort((a,b)=>{const pd=phase(a)-phase(b);return pd!==0?pd:a.open-b.open;});
  const plan=[];let curTime=960,curCluster='start';
  for(const v of sorted){
    const tr=getTransport(curCluster,v.cluster);
    if(v.fixed){
      const gap=v.open-(curTime+travelMin(curCluster,v.cluster));
      plan.push({v,start:v.open,end:v.open+v.dur,transport:tr,fixed:true,gap});
      curTime=v.open+v.dur;curCluster=v.cluster;continue;
    }
    const tMin=travelMin(curCluster,v.cluster);
    const earliest=Math.max(curTime+tMin,v.open);
    const end=earliest+v.dur;
    let warn=null;
    if(earliest>=v.close) warn='missed';
    else if(end>v.close) warn='tight';
    else if(v.close-end<15) warn='close';
    plan.push({v,start:earliest,end:warn==='missed'?earliest:end,transport:tr,warn});
    if(warn!=='missed'){curTime=end;curCluster=v.cluster;}
  }
  return plan;
}

const selected=new Set();
let filtered=[];

function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const dist=document.getElementById('f-district').value;
  const cat=document.getElementById('f-cat').value;
  const minOpen=parseInt(document.getElementById('f-open').value)||0;
  const minClose=parseInt(document.getElementById('f-close').value)||0;
  const warsawOnly=document.getElementById('f-warsaw').checked;
  filtered=VENUES.filter(v=>{
    if(warsawOnly&&!v.warsaw) return false;
    if(dist&&v.dist!==dist) return false;
    if(cat&&!v.cats.includes(cat)) return false;
    if(minOpen&&v.open>minOpen) return false;
    if(minClose&&v.close<minClose) return false;
    if(q){
      const hay=(v.name+' '+v.inst+' '+v.addr+' '+v.dist).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('f-result').textContent=filtered.length+' miejsc';
  renderVenues();
}

function clearFilters(){
  document.getElementById('search').value='';
  document.getElementById('f-district').value='';
  document.getElementById('f-cat').value='';
  document.getElementById('f-open').value='';
  document.getElementById('f-close').value='';
  document.getElementById('f-warsaw').checked=true;
  applyFilters();
}

function distClass(d){return 'bd-'+(d||'outer').replace(/\s/g,'-');}

function renderVenues(){
  const el=document.getElementById('venue-list');
  let html='';
  for(const v of filtered){
    const sel=selected.has(v.id);
    let badges='';
    if(v.close<=1290&&!v.fixed) badges+=`<span class="bdg bdg-warn">DEADLINE ${fmt(v.close)}</span>`;
    if(v.fixed) badges+=`<span class="bdg bdg-fixed">STAŁE OKNO</span>`;
    const catbadges=v.cats.slice(0,2).map(c=>`<span class="bdg bdg-cat">${c}</span>`).join('');
    const dc=distClass(v.dist);
    html+=`<div class="vcard ${sel?'selected':'deselected'}" onclick="toggle(${v.id})" id="vc-${v.id}">
      <div class="vcard-chk"><span class="vcard-tick">✓</span></div>
      <div class="vcard-body">
        <div class="vcard-name">${esc(v.name)}</div>
        <div class="vcard-inst">${esc(v.inst)}</div>
        <div class="vcard-foot">
          <span class="vhours">${v.os}–${v.cs}</span>
          <span class="bdg-d ${dc}">${v.dist||v.city}</span>
          ${catbadges}${badges}
        </div>
      </div>
      <a class="vcard-link" href="https://nocmuzeow.um.warszawa.pl/?page=de&id=${v.id}" target="_blank" onclick="event.stopPropagation()" title="Szczegóły">→</a>
    </div>`;
  }
  if(!html) html='<div style="padding:30px;text-align:center;font-size:12px;color:rgba(255,255,255,.3)">Brak wyników dla tych filtrów.</div>';
  el.innerHTML=html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTimeline(){
  const selVenues=VENUES.filter(v=>selected.has(v.id));
  const plan=computePlan(selVenues);
  const tl=document.getElementById('timeline');
  if(!selected.size){
    tl.innerHTML='<div class="no-plan"><strong>Zaznacz miejsca po lewej</strong>Algorytm ułoży optymalny plan zwiedzania z uwzględnieniem godzin otwarcia i transportu miejskiego.</div>';
    return;
  }
  let html='<div class="tl">';
  plan.forEach((item,i)=>{
    const{v,start,end,transport,fixed,warn,gap}=item;
    const hasLine=i<plan.length-1;
    if(i>0&&transport){
      const tc=`tl-tc tc-${transport.type}`;
      html+=`<div class="tl-transport"><div style="width:20px;display:flex;justify-content:center"><div style="width:2px;height:14px;background:rgba(255,255,255,.07)"></div></div><span class="${tc}">${transport.text}</span></div>`;
    } else if(i>0){html+=`<div style="height:5px"></div>`;}
    let cc='tl-card'+(fixed?' fixed-win':'')+(warn==='missed'?' warn-missed':(warn==='tight'||warn==='close')?' warn-tight':'');
    let tags='';
    if(warn==='missed') tags+=`<span class="tag tag-missed">Niemożliwe w tym czasie</span>`;
    else if(warn==='tight') tags+=`<span class="tag tag-tight">Wychodzisz po zamknięciu!</span>`;
    else if(warn==='close') tags+=`<span class="tag tag-tight">&lt;15 min buforu</span>`;
    else tags+=`<span class="tag tag-ok">OK</span>`;
    if(fixed) tags+=`<span class="tag tag-fixed">Stałe okno</span>`;
    if(v.close<=1290&&!v.fixed) tags+=`<span class="tag tag-close">Deadline ${fmt(v.close)}</span>`;
    tags+=`<span class="tag tag-dur">~${v.dur} min</span>`;
    tags+=`<a class="tag tag-link" href="https://nocmuzeow.um.warszawa.pl/?page=de&id=${v.id}" target="_blank">Szczegóły →</a>`;
    let gapNote='';
    if(fixed&&gap>0&&gap<60) gapNote=`<div class="gap-note">Docierasz ${gap} min przed startem — jest bufor.</div>`;
    if(fixed&&gap<0) gapNote=`<div class="gap-note" style="color:#ff6450">Możliwe spóźnienie o ${Math.abs(gap)} min.</div>`;
    html+=`<div class="tl-row">
      <div class="tl-tc-col"><div class="tl-t">${fmt(start)}</div></div>
      <div class="tl-dc"><div class="tl-dot dot-${v.cluster}"></div>${hasLine?'<div class="tl-line"></div>':''}</div>
      <div class="tl-content"><div class="${cc}">
        <div class="tl-cname">${esc(v.name)}</div>
        <div class="tl-caddr">${esc(v.addr)} · ${v.dist||v.city}</div>
        <div class="tl-ctags">${tags}</div>${gapNote}
      </div></div>
    </div>`;
  });
  html+='</div>';
  const valid=plan.filter(p=>p.warn!=='missed');
  const lastEnd=valid.length?valid[valid.length-1].end:960;
  const missed=plan.filter(p=>p.warn==='missed');
  html+=`<div class="summary">
    <div class="sum-item"><strong>${valid.length}</strong>w planie</div>
    ${missed.length?`<div class="sum-item"><strong style="color:#ff5040">${missed.length}</strong>niemożliwe</div>`:''}
    <div class="sum-item"><strong>16:00</strong>start</div>
    <div class="sum-item"><strong>${fmt(lastEnd)}</strong>koniec (szac.)</div>
  </div>`;
  tl.innerHTML=html;
}

function renderStats(){
  document.getElementById('s-count').textContent=selected.size;
  if(!selected.size){document.getElementById('s-end').textContent='—';return;}
  const selVenues=VENUES.filter(v=>selected.has(v.id));
  const plan=computePlan(selVenues);
  const valid=plan.filter(p=>p.warn!=='missed');
  const lastEnd=valid.length?valid[valid.length-1].end:960;
  document.getElementById('s-end').textContent=fmt(lastEnd);
}

function toggle(id){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  const card=document.getElementById('vc-'+id);
  if(card){card.classList.toggle('selected',selected.has(id));card.classList.toggle('deselected',!selected.has(id));}
  update();
}

function update(){renderTimeline();renderStats();}

applyFilters();
update();
</script>
</body>
</html>
